# Evaluation setup.
# Reference: plan section 11.

lm_loss:
  seq_len: 8192
  # 1M tokens keeps per-candidate eval ~12 min on A100, fitting 20 candidates
  # inside the 12h overnight window. Raise back to 20_000_000 for final eval.
  num_tokens: 1_000_000

throughput:
  input_lens: [4096]
  output_lens: [256]
  batch_sizes: [1, 4]
  warmup_iters: 2
  measure_iters: 5

# Reduced Table 4 task list. Optional tasks are appended only if time allows.
lm_eval_harness:
  tasks:
    - arc_challenge
    - arc_easy
    - hellaswag
    - piqa
    - winogrande
    - openbookqa
    - mmlu
  optional_tasks:
    - gsm8k
    - humaneval
    - mbpp
  num_fewshot: 0
  batch_size: "auto"
